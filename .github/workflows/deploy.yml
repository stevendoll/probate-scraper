name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: "600775874112"
  ECR_REPO: probate-scraper/scraper
  STACK_NAME: probate-scraper-collin-tx

jobs:
  # ── Unit tests (must pass before deploy) ───────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run unit tests
        run: pipenv run python -m unittest discover -s tests -p "test_*.py" -v

  # ── Deploy to AWS ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    needs: test
    runs-on: ubuntu-latest
    environment: production   # optional: add required-reviewers in GitHub settings
    outputs:
      api_endpoint: ${{ steps.stack-outputs.outputs.endpoint }}

    steps:
      - uses: actions/checkout@v4

      # ── AWS credentials ────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Docker — build & push scraper image ───────────────────────────────
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if it does not exist
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO" \
            --region "$AWS_REGION" 2>/dev/null \
          || aws ecr create-repository --repository-name "$ECR_REPO" \
            --region "$AWS_REGION" \
            --image-scanning-configuration scanOnPush=true \
            --tags Key=Project,Value=probate-scraper

      - name: Build and push scraper Docker image
        env:
          ECR_URI: ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
        run: |
          docker build -t $ECR_URI:latest src/scraper/
          docker push $ECR_URI:latest

      # ── Discover default VPC + public subnets ─────────────────────────────
      - name: Discover VPC and subnets
        id: vpc
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=is-default,Values=true \
            --query 'Vpcs[0].VpcId' \
            --output text)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "ERROR: No default VPC found in $AWS_REGION."
            echo "Create one with: aws ec2 create-default-vpc --region $AWS_REGION"
            exit 1
          fi

          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query 'Subnets[*].SubnetId' \
            --output text | tr '\t' ',')

          if [ -z "$SUBNET_IDS" ] || [ "$SUBNET_IDS" = "None" ]; then
            echo "ERROR: No subnets found in VPC $VPC_ID."
            exit 1
          fi

          echo "vpc_id=$VPC_ID"         >> $GITHUB_OUTPUT
          echo "subnet_ids=$SUBNET_IDS" >> $GITHUB_OUTPUT
          echo "Discovered VPC: $VPC_ID"
          echo "Discovered subnets: $SUBNET_IDS"

      # ── Ensure deploy IAM permissions ─────────────────────────────────────
      - name: Ensure deploy IAM permissions
        run: |
          aws iam put-user-policy \
            --user-name probate-scraper-deploy \
            --policy-name CloudFrontDeploy \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"cloudfront:*","Resource":"*"}]}'
          aws iam put-user-policy \
            --user-name probate-scraper-deploy \
            --policy-name SsmSecretRead \
            --policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["ssm:GetParameter","ssm:GetParameters"],"Resource":"arn:aws:ssm:${{ env.AWS_REGION }}:${{ env.ACCOUNT_ID }}:parameter/probate-scraper/*"}]}'

      # ── Read JWT secret from SSM ───────────────────────────────────────────
      # {{resolve:ssm-secure:...}} is not supported in Lambda env vars.
      # Read the value here so it can be passed as a normal parameter override.
      - name: Read JWT secret from SSM
        id: jwt
        run: |
          JWT_SECRET=$(aws ssm get-parameter \
            --name /probate-scraper/jwt-secret \
            --with-decryption \
            --query Parameter.Value \
            --output text \
            --region $AWS_REGION)
          echo "::add-mask::$JWT_SECRET"
          echo "value=$JWT_SECRET" >> $GITHUB_OUTPUT

      # ── SAM build + deploy ─────────────────────────────────────────────────
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --parallel

      - name: SAM deploy
        env:
          VPC_ID: ${{ steps.vpc.outputs.vpc_id }}
          SUBNET_IDS: ${{ steps.vpc.outputs.subnet_ids }}
          ECR_URI: ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          USERNAME_COLLINTX: ${{ secrets.USERNAME_COLLINTX }}
          PASSWORD_COLLINTX: ${{ secrets.PASSWORD_COLLINTX }}
          MAGIC_LINK_BASE_URL: ${{ vars.MAGIC_LINK_BASE_URL || 'https://collincountyleads.com/auth/verify' }}
          FROM_EMAIL: ${{ vars.FROM_EMAIL || 'hello@collincountyleads.com' }}
        run: |
          # Build overrides array. Stripe params are optional — SAM rejects
          # "Key=" (empty value), so only include them when the secret is set.
          # ScrapeSchedule is intentionally omitted — it contains spaces which
          # SAM CLI cannot handle in --parameter-overrides. The template
          # Default "cron(0 6 * * ? *)" is used automatically.
          # JwtSecret is read from SSM in the prior step and masked in logs.
          # MagicLinkBaseUrl/FromEmail: use GHA var if set, else hardcoded default.
          # NOTE: --parameter-overrides on the CLI replaces samconfig.toml ones,
          # so these must always be included explicitly.
          OVERRIDES=(
            "VpcId=$VPC_ID"
            "SubnetIds=$SUBNET_IDS"
            "ScraperImageUri=$ECR_URI"
            "JwtSecret=${{ steps.jwt.outputs.value }}"
            "MagicLinkBaseUrl=$MAGIC_LINK_BASE_URL"
            "FromEmail=$FROM_EMAIL"
            "AcmCertificateArn=arn:aws:acm:us-east-1:600775874112:certificate/396a9f34-bb06-4414-97ed-16a71c44129b"
            "UiDomainAliases=collincountyleads.com,www.collincountyleads.com"
            "ApiDomainName=api.collincountyleads.com"
            "UiBaseUrl=https://collincountyleads.com"
          )
          [ -n "$STRIPE_SECRET_KEY" ]    && OVERRIDES+=("StripeSecretKey=$STRIPE_SECRET_KEY")
          [ -n "$STRIPE_WEBHOOK_SECRET" ] && OVERRIDES+=("StripeWebhookSecret=$STRIPE_WEBHOOK_SECRET")
          [ -n "$USERNAME_COLLINTX" ]    && OVERRIDES+=("ScraperUsername=$USERNAME_COLLINTX")
          [ -n "$PASSWORD_COLLINTX" ]    && OVERRIDES+=("ScraperPassword=$PASSWORD_COLLINTX")

          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --import-existing-resources \
            --parameter-overrides "${OVERRIDES[@]}"

      # ── Retrieve stack outputs ─────────────────────────────────────────────
      - name: Get stack outputs
        id: stack-outputs
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
          UI_URL=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`UiUrl`].OutputValue' \
            --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "ui_url=$UI_URL"     >> $GITHUB_OUTPUT
          echo "API endpoint: $ENDPOINT"
          echo "UI URL: $UI_URL"

      - name: Get API key
        id: api-key
        run: |
          KEY_ID=$(aws cloudformation describe-stack-resources \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --query 'StackResources[?ResourceType==`AWS::ApiGateway::ApiKey`].PhysicalResourceId | [0]' \
            --output text)
          echo "API key resource ID: $KEY_ID"

          KEY_VALUE=$(aws apigateway get-api-key \
            --api-key "$KEY_ID" \
            --include-value \
            --query 'value' \
            --output text \
            --region $AWS_REGION)
          echo "API key length: ${#KEY_VALUE}"

          if [ -z "$KEY_VALUE" ] || [ "$KEY_VALUE" = "None" ]; then
            echo "ERROR: Failed to retrieve API key value"
            exit 1
          fi

          # Mask the key so it never appears in logs
          echo "::add-mask::$KEY_VALUE"
          echo "api_key=$KEY_VALUE" >> $GITHUB_OUTPUT

      # ── Seed locations table ───────────────────────────────────────────────
      - name: Seed locations table
        run: |
          python3 - <<'EOF'
          import boto3, os
          client = boto3.client("dynamodb", region_name=os.environ["AWS_REGION"])
          # Put CollinTx only if it doesn't already exist
          try:
              client.put_item(
                  TableName="locations",
                  Item={
                      "location_code": {"S": "CollinTx"},
                      "location_path": {"S": "collin-tx"},
                      "location_name": {"S": "Collin County TX"},
                      "search_url":    {"S": "https://collin.tx.publicsearch.us"},
                      "retrieved_at":  {"S": ""},
                  },
                  ConditionExpression="attribute_not_exists(location_code)",
              )
              print("Seeded CollinTx location")
          except client.exceptions.ConditionalCheckFailedException:
              print("CollinTx already exists — skipping")
          EOF

      # ── Wait for API Gateway deployment to propagate ───────────────────────
      # API Gateway stage updates can take up to ~30 s after CloudFormation
      # reports success.  Without this pause, early smoke-test requests can hit
      # a transitional state where routes return 403 "Missing Authentication
      # Token" instead of reaching Lambda.
      - name: Wait for API Gateway propagation
        run: sleep 30

      # ── Python env for smoke tests ─────────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install

      # ── Smoke tests (API + CORS) ───────────────────────────────────────────
      - name: Run smoke tests
        env:
          SMOKE_BASE_URL: ${{ steps.stack-outputs.outputs.endpoint }}
          SMOKE_API_KEY: ${{ steps.api-key.outputs.api_key }}
          SMOKE_UI_URL: ${{ steps.stack-outputs.outputs.ui_url }}
        run: pipenv run python scripts/smoke_test.py

      # ── Deploy UI (React SPA → S3 + CloudFront invalidation) ───────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Get CloudFront distribution ID
        id: cf
        run: |
          DIST_ID=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME --region $AWS_REGION \
            --query "Stacks[0].Outputs[?OutputKey=='UiDistributionId'].OutputValue" \
            --output text)
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME --region $AWS_REGION \
            --query "Stacks[0].Outputs[?OutputKey=='UiBucketName'].OutputValue" \
            --output text)
          echo "dist_id=$DIST_ID"   >> $GITHUB_OUTPUT
          echo "ui_bucket=$BUCKET"  >> $GITHUB_OUTPUT

      - name: Build UI
        working-directory: ui
        env:
          VITE_API_URL: ${{ steps.stack-outputs.outputs.endpoint }}/real-estate/probate-leads
          VITE_API_KEY: ${{ steps.api-key.outputs.api_key }}
        run: npm run build

      - name: Sync UI to S3
        run: |
          aws s3 sync ui/dist/ s3://${{ steps.cf.outputs.ui_bucket }} \
            --delete --region $AWS_REGION

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cf.outputs.dist_id }} \
            --paths "/*"

      # ── UI smoke test ──────────────────────────────────────────────────────
      # Re-run after deploy-ui so test_ui() checks the freshly deployed SPA.
      - name: Run UI smoke test
        env:
          SMOKE_BASE_URL: ${{ steps.stack-outputs.outputs.endpoint }}
          SMOKE_API_KEY: ${{ steps.api-key.outputs.api_key }}
          SMOKE_UI_URL: ${{ steps.stack-outputs.outputs.ui_url }}
        run: pipenv run python scripts/smoke_test.py
