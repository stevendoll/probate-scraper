name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ACCOUNT_ID: "600775874112"
  ECR_REPO: probate-scraper/scraper
  STACK_NAME: probate-scraper-collin-tx

jobs:
  # ── Unit tests (must pass before deploy) ───────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run unit tests
        run: pipenv run python -m unittest discover -s tests -p "test_*.py" -v

  # ── Deploy to AWS ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    needs: test
    runs-on: ubuntu-latest
    environment: production   # optional: add required-reviewers in GitHub settings
    outputs:
      api_endpoint: ${{ steps.stack-outputs.outputs.endpoint }}

    steps:
      - uses: actions/checkout@v4

      # ── AWS credentials ────────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Docker — build & push scraper image ───────────────────────────────
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if it does not exist
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPO" \
            --region "$AWS_REGION" 2>/dev/null \
          || aws ecr create-repository --repository-name "$ECR_REPO" \
            --region "$AWS_REGION" \
            --image-scanning-configuration scanOnPush=true \
            --tags Key=Project,Value=probate-scraper

      - name: Build and push scraper Docker image
        env:
          ECR_URI: ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
        run: |
          docker build -t $ECR_URI:latest src/scraper/
          docker push $ECR_URI:latest

      # ── Discover default VPC + public subnets ─────────────────────────────
      - name: Discover VPC and subnets
        id: vpc
        run: |
          VPC_ID=$(aws ec2 describe-vpcs \
            --filters Name=is-default,Values=true \
            --query 'Vpcs[0].VpcId' \
            --output text)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "ERROR: No default VPC found in $AWS_REGION."
            echo "Create one with: aws ec2 create-default-vpc --region $AWS_REGION"
            exit 1
          fi

          SUBNET_IDS=$(aws ec2 describe-subnets \
            --filters "Name=vpc-id,Values=$VPC_ID" \
            --query 'Subnets[*].SubnetId' \
            --output text | tr '\t' ',')

          if [ -z "$SUBNET_IDS" ] || [ "$SUBNET_IDS" = "None" ]; then
            echo "ERROR: No subnets found in VPC $VPC_ID."
            exit 1
          fi

          echo "vpc_id=$VPC_ID"         >> $GITHUB_OUTPUT
          echo "subnet_ids=$SUBNET_IDS" >> $GITHUB_OUTPUT
          echo "Discovered VPC: $VPC_ID"
          echo "Discovered subnets: $SUBNET_IDS"

      # ── SAM build + deploy ─────────────────────────────────────────────────
      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM build
        run: sam build --parallel

      - name: SAM deploy
        env:
          VPC_ID: ${{ steps.vpc.outputs.vpc_id }}
          SUBNET_IDS: ${{ steps.vpc.outputs.subnet_ids }}
          ECR_URI: ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          USERNAME_COLLINTX: ${{ secrets.USERNAME_COLLINTX }}
          PASSWORD_COLLINTX: ${{ secrets.PASSWORD_COLLINTX }}
        run: |
          # Build overrides array. Stripe params are optional — SAM rejects
          # "Key=" (empty value), so only include them when the secret is set.
          # ScrapeSchedule is intentionally omitted — it contains spaces which
          # SAM CLI cannot handle in --parameter-overrides. The template
          # Default "cron(0 6 * * ? *)" is used automatically.
          OVERRIDES=(
            "VpcId=$VPC_ID"
            "SubnetIds=$SUBNET_IDS"
            "ScraperImageUri=$ECR_URI"
          )
          [ -n "$STRIPE_SECRET_KEY" ]    && OVERRIDES+=("StripeSecretKey=$STRIPE_SECRET_KEY")
          [ -n "$STRIPE_WEBHOOK_SECRET" ] && OVERRIDES+=("StripeWebhookSecret=$STRIPE_WEBHOOK_SECRET")
          [ -n "$USERNAME_COLLINTX" ]    && OVERRIDES+=("ScraperUsername=$USERNAME_COLLINTX")
          [ -n "$PASSWORD_COLLINTX" ]    && OVERRIDES+=("ScraperPassword=$PASSWORD_COLLINTX")

          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${OVERRIDES[@]}"

      # ── Retrieve stack outputs ─────────────────────────────────────────────
      - name: Get stack outputs
        id: stack-outputs
        run: |
          ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiEndpoint`].OutputValue' \
            --output text)
          echo "endpoint=$ENDPOINT" >> $GITHUB_OUTPUT
          echo "API endpoint: $ENDPOINT"

      - name: Get API key
        id: api-key
        run: |
          KEY_ID=$(aws cloudformation describe-stack-resources \
            --stack-name $STACK_NAME \
            --region $AWS_REGION \
            --query 'StackResources[?ResourceType==`AWS::ApiGateway::ApiKey`].PhysicalResourceId | [0]' \
            --output text)
          echo "API key resource ID: $KEY_ID"

          KEY_VALUE=$(aws apigateway get-api-key \
            --api-key "$KEY_ID" \
            --include-value \
            --query 'value' \
            --output text \
            --region $AWS_REGION)
          echo "API key length: ${#KEY_VALUE}"

          if [ -z "$KEY_VALUE" ] || [ "$KEY_VALUE" = "None" ]; then
            echo "ERROR: Failed to retrieve API key value"
            exit 1
          fi

          # Mask the key so it never appears in logs
          echo "::add-mask::$KEY_VALUE"
          echo "api_key=$KEY_VALUE" >> $GITHUB_OUTPUT

      # ── Seed locations table ───────────────────────────────────────────────
      - name: Seed locations table
        run: |
          python3 - <<'EOF'
          import boto3, os
          client = boto3.client("dynamodb", region_name=os.environ["AWS_REGION"])
          # Put CollinTx only if it doesn't already exist
          try:
              client.put_item(
                  TableName="locations",
                  Item={
                      "location_code": {"S": "CollinTx"},
                      "location_path": {"S": "collin-tx"},
                      "location_name": {"S": "Collin County TX"},
                      "search_url":    {"S": "https://collin.tx.publicsearch.us"},
                      "retrieved_at":  {"S": ""},
                  },
                  ConditionExpression="attribute_not_exists(location_code)",
              )
              print("Seeded CollinTx location")
          except client.exceptions.ConditionalCheckFailedException:
              print("CollinTx already exists — skipping")
          EOF

      # ── Wait for API Gateway deployment to propagate ───────────────────────
      # API Gateway stage updates can take up to ~30 s after CloudFormation
      # reports success.  Without this pause, early smoke-test requests can hit
      # a transitional state where routes return 403 "Missing Authentication
      # Token" instead of reaching Lambda.
      - name: Wait for API Gateway propagation
        run: sleep 30

      # ── Python env for smoke tests ─────────────────────────────────────────
      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install

      # ── Smoke tests ────────────────────────────────────────────────────────
      - name: Run smoke tests
        env:
          SMOKE_BASE_URL: ${{ steps.stack-outputs.outputs.endpoint }}
          SMOKE_API_KEY: ${{ steps.api-key.outputs.api_key }}
        run: pipenv run python scripts/smoke_test.py
