name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Unit tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pipenv
        run: pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Run unit tests
        run: pipenv run python -m unittest discover -s tests -p "test_*.py" -v

  # ── SAM template validation ────────────────────────────────────────────────
  validate-template:
    name: SAM validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # Real AWS credentials are not required for schema/YAML validation.
      # Dummy values satisfy the SDK credential check.
      - name: SAM validate
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: local
          AWS_SECRET_ACCESS_KEY: local
        run: sam validate
