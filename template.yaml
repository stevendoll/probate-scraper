AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Probate leads — ECS Fargate scraper + API Gateway REST API backed by DynamoDB.
  Supports multiple counties via the locations table.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in which the Fargate task will run (default VPC is fine)

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Public subnets for the Fargate task (assignPublicIp=ENABLED is used so
      the task can reach the internet without a NAT Gateway)

  ScraperImageUri:
    Type: String
    Description: >
      Full ECR image URI for the scraper container,
      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/probate-scraper/scraper:latest

  ScrapeSchedule:
    Type: String
    Default: "cron(0 6 * * ? *)"
    Description: EventBridge schedule expression for the daily scrape (UTC)

  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe secret key (sk_live_... or sk_test_...)

  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe webhook signing secret (whsec_...)

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    Architectures: [x86_64]
    Environment:
      Variables:
        DYNAMO_TABLE_NAME: !Ref LeadsTable
        LOCATIONS_TABLE_NAME: !Ref LocationsTable
        SUBSCRIBERS_TABLE_NAME: !Ref SubscribersTable
        GSI_NAME: recorded-date-index
        LOCATION_DATE_GSI: location-date-index
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── DynamoDB — Leads ──────────────────────────────────────────────────────
  # NOTE: renamed from probate-leads-collin-tx → leads.
  # CloudFormation will replace (delete + recreate) the table on first deploy.
  # Migrate data before deploying if the live table has records you need.

  LeadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: leads
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: doc_number
          AttributeType: S
        - AttributeName: doc_type
          AttributeType: S
        - AttributeName: recorded_date
          AttributeType: S
        - AttributeName: location_code
          AttributeType: S
      KeySchema:
        - AttributeName: doc_number
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Legacy GSI — kept for backward compatibility
        - IndexName: recorded-date-index
          KeySchema:
            - AttributeName: doc_type
              KeyType: HASH
            - AttributeName: recorded_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # New GSI — query leads by location efficiently
        - IndexName: location-date-index
          KeySchema:
            - AttributeName: location_code
              KeyType: HASH
            - AttributeName: recorded_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Locations ──────────────────────────────────────────────────

  LocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: locations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: location_code
          AttributeType: S
        - AttributeName: location_path
          AttributeType: S
      KeySchema:
        - AttributeName: location_code
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Allows API to resolve location_path → location_code
        - IndexName: location-path-index
          KeySchema:
            - AttributeName: location_path
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Subscribers ────────────────────────────────────────────────

  SubscribersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: subscribers
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: subscriber_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: subscriber_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── CloudWatch Log Group ──────────────────────────────────────────────────

  ScraperLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/probate-scraper
      RetentionInDays: 30

  # ── ECS ───────────────────────────────────────────────────────────────────

  ScraperCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: probate-scraper-cluster

  ScraperTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ScraperTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchWriteItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt LeadsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt LocationsTable.Arn

  ScraperSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate scraper — outbound only
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ScraperTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: probate-scraper
      Cpu: "1024"
      Memory: "2048"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ScraperTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ScraperTaskRole.Arn
      ContainerDefinitions:
        - Name: scraper
          Image: !Ref ScraperImageUri
          Essential: true
          Environment:
            - Name: DYNAMO_TABLE_NAME
              Value: !Ref LeadsTable
            - Name: LOCATIONS_TABLE_NAME
              Value: !Ref LocationsTable
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: LOCATION_CODE
              Value: CollinTx
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ScraperLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: scraper

  # ── API Gateway ───────────────────────────────────────────────────────────

  ProbateApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: probate-leads-api
      StageName: prod
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          Throttle:
            RateLimit: 10
            BurstLimit: 20

  # ── Lambda — API (leads + locations + subscribers + stripe webhook) ────────

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-api
      CodeUri: src/api/
      Handler: app.handler
      MemorySize: 256
      Timeout: 10
      Policies:
        # Leads — read only
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt LeadsTable.Arn
                - !Sub "${LeadsTable.Arn}/index/*"
        # Locations — read only
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt LocationsTable.Arn
                - !Sub "${LocationsTable.Arn}/index/*"
        # Subscribers — full CRUD
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt SubscribersTable.Arn
                - !Sub "${SubscribersTable.Arn}/index/*"
      Events:
        # Leads — dynamic by location_path
        GetLeads:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/{location_path}/leads
            Method: GET
        # Locations
        ListLocations:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/locations
            Method: GET
        GetLocation:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/locations/{location_code}
            Method: GET
        # Subscribers
        ListSubscribers:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/subscribers
            Method: GET
        CreateSubscriber:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/subscribers
            Method: POST
        GetSubscriber:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/subscribers/{subscriber_id}
            Method: GET
        UpdateSubscriber:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/subscribers/{subscriber_id}
            Method: PATCH
        DeleteSubscriber:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/subscribers/{subscriber_id}
            Method: DELETE
        # Stripe webhook — no API key required (verified by signature)
        StripeWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/stripe/webhook
            Method: POST
            Auth:
              ApiKeyRequired: false

  # ── Lambda — POST /{location_path}/update ─────────────────────────────────

  TriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-trigger
      CodeUri: src/trigger/
      Handler: app.handler
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          ECS_CLUSTER_ARN: !GetAtt ScraperCluster.Arn
          TASK_DEFINITION_ARN: !Ref ScraperTaskDefinition
          TASK_SUBNETS: !Join [",", !Ref SubnetIds]
          TASK_SECURITY_GROUP: !Ref ScraperSecurityGroup
          LOCATIONS_TABLE_NAME: !Ref LocationsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action: ecs:RunTask
              Resource: !Ref ScraperTaskDefinition
            - Effect: Allow
              Action: iam:PassRole
              Resource:
                - !GetAtt ScraperTaskExecutionRole.Arn
                - !GetAtt ScraperTaskRole.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !GetAtt LocationsTable.Arn
                - !Sub "${LocationsTable.Arn}/index/*"
      Events:
        PostUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/{location_path}/update
            Method: POST

  # ── EventBridge — daily scheduled scrape ─────────────────────────────────

  EventBridgeEcsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-eventbridge-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunEcsTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref ScraperTaskDefinition
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt ScraperTaskExecutionRole.Arn
                  - !GetAtt ScraperTaskRole.Arn

  ScheduledScrapeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: probate-scraper-daily
      Description: Daily trigger for the Collin County probate scraper
      ScheduleExpression: !Ref ScrapeSchedule
      State: ENABLED
      Targets:
        - Id: ScraperFargateTask
          Arn: !GetAtt ScraperCluster.Arn
          RoleArn: !GetAtt EventBridgeEcsRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref ScraperTaskDefinition
            TaskCount: 1
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets: !Ref SubnetIds
                SecurityGroups:
                  - !Ref ScraperSecurityGroup
                AssignPublicIp: ENABLED

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiEndpoint:
    Description: API Gateway base URL
    Value: !Sub "https://${ProbateApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  ApiKeyId:
    Description: >
      API key ID — retrieve the value with:
      aws apigateway get-api-key --api-key <this-value> --include-value --query value --output text
    Value: !Sub "${ProbateApi}ApiKey"

  EcsClusterName:
    Description: ECS cluster name
    Value: !Ref ScraperCluster

  TaskDefinitionArn:
    Description: Scraper task definition ARN
    Value: !Ref ScraperTaskDefinition

  LeadsTableName:
    Description: Leads DynamoDB table name
    Value: !Ref LeadsTable

  LeadsTableArn:
    Description: Leads DynamoDB table ARN
    Value: !GetAtt LeadsTable.Arn

  LocationsTableName:
    Description: Locations DynamoDB table name
    Value: !Ref LocationsTable

  SubscribersTableName:
    Description: Subscribers DynamoDB table name
    Value: !Ref SubscribersTable
