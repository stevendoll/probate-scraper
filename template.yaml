AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Probate leads — ECS Fargate scraper + API Gateway REST API backed by DynamoDB.
  Supports multiple counties via the locations table.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in which the Fargate task will run (default VPC is fine)

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Public subnets for the Fargate task (assignPublicIp=ENABLED is used so
      the task can reach the internet without a NAT Gateway)

  ScraperImageUri:
    Type: String
    Description: >
      Full ECR image URI for the scraper container,
      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/probate-scraper/scraper:latest

  ScrapeSchedule:
    Type: String
    Default: "cron(0 6 * * ? *)"
    Description: EventBridge schedule expression for the daily scrape (UTC)

  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe secret key (sk_live_... or sk_test_...)

  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe webhook signing secret (whsec_...)

  ScraperUsername:
    Type: String
    Default: ""
    Description: >
      Login email / username for the county search portal.
      Leave blank to skip authentication (public access only).

  ScraperPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: Login password for the county search portal.

  DocumentsBucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket name for storing scraped documents. Leave blank to let
      CloudFormation generate a unique name.

  BedrockModelId:
    Type: String
    Default: "us.amazon.nova-pro-v1:0"
    Description: >
      Amazon Bedrock model ID used by ParseDocumentFunction.
      Amazon Nova Pro (us.amazon.nova-pro-v1:0) and Nova Lite support document
      blocks natively via cross-region inference profiles.  Anthropic Claude
      models (Haiku, Sonnet, etc.) silently ignore the document bytes even when
      the Converse API call succeeds — do not use Claude models here.
      Run "make check-bedrock" to verify access before deploying.

  JwtSecret:
    Type: String
    Default: "dev-secret-change-in-prod"
    NoEcho: true
    Description: >
      HMAC-SHA256 secret used to sign magic-link and access tokens.
      Must be a long random string in production.

  MagicLinkBaseUrl:
    Type: String
    Default: "http://localhost:3001/auth/verify"
    Description: >
      Base URL for magic-link emails, e.g. https://app.example.com/auth/verify.
      The token is appended as ?token=<value>.

  FromEmail:
    Type: String
    Default: ""
    Description: >
      SES-verified sender address for magic-link emails.
      Leave blank to skip sending (local dev / CI).


  UiBucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket name for the React SPA static assets.
      Leave blank to let CloudFormation generate a unique name.
# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasDocumentsBucketName: !Not [!Equals [!Ref DocumentsBucketName, ""]]
  HasUiBucketName: !Not [!Equals [!Ref UiBucketName, ""]]

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    Architectures: [x86_64]
    Environment:
      Variables:
        DYNAMO_TABLE_NAME: !Ref LeadsTable
        LOCATIONS_TABLE_NAME: !Ref LocationsTable
        USERS_TABLE_NAME: !Ref UsersTable
        GSI_NAME: recorded-date-index
        LOCATION_DATE_GSI: location-date-index
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
        JWT_SECRET: !Ref JwtSecret
        MAGIC_LINK_BASE_URL: !Ref MagicLinkBaseUrl
        FROM_EMAIL: !Ref FromEmail

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── S3 — Documents ────────────────────────────────────────────────────────
  # Stores a copy of each scraped PDF / image, keyed as:
  #   documents/{location_code}/{doc_number}{ext}
  # The DOCUMENTS_BUCKET env var is injected into the ECS task definition so
  # the scraper can upload directly from the Fargate container.

  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasDocumentsBucketName
        - !Ref DocumentsBucketName
        - !Ref AWS::NoValue
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── DynamoDB — Leads ──────────────────────────────────────────────────────
  # NOTE: renamed leads → leads-v2 to change the PK from doc_number → lead_id.
  # CloudFormation requires a name change when replacing a custom-named table.
  # Migrate data before deploying if the live table has records you need.

  LeadsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: leads-v2
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: lead_id
          AttributeType: S
        - AttributeName: doc_type
          AttributeType: S
        - AttributeName: recorded_date
          AttributeType: S
        - AttributeName: location_code
          AttributeType: S
      KeySchema:
        - AttributeName: lead_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Legacy GSI — kept for backward compatibility
        - IndexName: recorded-date-index
          KeySchema:
            - AttributeName: doc_type
              KeyType: HASH
            - AttributeName: recorded_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # New GSI — query leads by location efficiently
        - IndexName: location-date-index
          KeySchema:
            - AttributeName: location_code
              KeyType: HASH
            - AttributeName: recorded_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Locations ──────────────────────────────────────────────────

  LocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: locations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: location_code
          AttributeType: S
        - AttributeName: location_path
          AttributeType: S
      KeySchema:
        - AttributeName: location_code
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Allows API to resolve location_path → location_code
        - IndexName: location-path-index
          KeySchema:
            - AttributeName: location_path
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Users ──────────────────────────────────────────────────────
  # NOTE: renamed from subscribers → users (PK subscriber_id → user_id).
  # CloudFormation will replace (delete + recreate) the table on first deploy
  # of this branch — export any production data before deploying.

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── CloudWatch Log Group ──────────────────────────────────────────────────

  ScraperLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/probate-scraper
      RetentionInDays: 30

  # ── ECS ───────────────────────────────────────────────────────────────────

  ScraperCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: probate-scraper-cluster

  ScraperTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ScraperTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchWriteItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt LeadsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub "${LeadsTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt LocationsTable.Arn
        - PolicyName: S3DocumentsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "${DocumentsBucket.Arn}/documents/*"

  ScraperSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate scraper - outbound only
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ScraperTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: probate-scraper
      Cpu: "1024"
      Memory: "2048"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ScraperTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ScraperTaskRole.Arn
      ContainerDefinitions:
        - Name: scraper
          Image: !Ref ScraperImageUri
          Essential: true
          Environment:
            - Name: DYNAMO_TABLE_NAME
              Value: !Ref LeadsTable
            - Name: LOCATIONS_TABLE_NAME
              Value: !Ref LocationsTable
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: LOCATION_CODE
              Value: CollinTx
            - Name: DOCUMENTS_BUCKET
              Value: !Ref DocumentsBucket
            - Name: SCRAPER_USERNAME
              Value: !Ref ScraperUsername
            - Name: SCRAPER_PASSWORD
              Value: !Ref ScraperPassword
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ScraperLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: scraper

  # ── API Gateway ───────────────────────────────────────────────────────────

  ProbateApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: probate-leads-api
      StageName: prod
      Auth:
        ApiKeyRequired: true
        UsagePlan:
          CreateUsagePlan: PER_API
          Throttle:
            RateLimit: 10
            BurstLimit: 20

  # ── Lambda — API (leads + locations + users + stripe + auth + admin) ───────

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-api
      CodeUri: src/api/
      Handler: app.handler
      MemorySize: 256
      Timeout: 10
      Policies:
        # Leads — read only
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt LeadsTable.Arn
                - !Sub "${LeadsTable.Arn}/index/*"
        # Locations — read only
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt LocationsTable.Arn
                - !Sub "${LocationsTable.Arn}/index/*"
        # Users — full CRUD
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt UsersTable.Arn
                - !Sub "${UsersTable.Arn}/index/*"
        # SES — send magic-link emails (only when FROM_EMAIL is set)
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
      Events:
        # Leads — dynamic by location_path
        GetLeads:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/{location_path}/leads
            Method: GET
        # Locations
        ListLocations:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/locations
            Method: GET
        GetLocation:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/locations/{location_code}
            Method: GET
        # Users
        ListUsers:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users
            Method: GET
        CreateUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users
            Method: POST
        GetUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users/{user_id}
            Method: GET
        UpdateUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users/{user_id}
            Method: PATCH
        DeleteUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users/{user_id}
            Method: DELETE
        # Stripe webhook — no API key required (verified by signature)
        StripeWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/stripe/webhook
            Method: POST
            Auth:
              ApiKeyRequired: false
        # Auth — magic-link login (no API key required; Bearer JWT used instead)
        AuthRequestLogin:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/request-login
            Method: POST
            Auth:
              ApiKeyRequired: false
        AuthVerify:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/verify
            Method: GET
            Auth:
              ApiKeyRequired: false
        AuthMe:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/me
            Method: GET
            Auth:
              ApiKeyRequired: false
        AuthPatchMe:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/me
            Method: PATCH
            Auth:
              ApiKeyRequired: false
        AuthLeads:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/leads
            Method: GET
            Auth:
              ApiKeyRequired: false
        # Admin — user management (no API key; admin Bearer JWT required)
        AdminListUsers:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users
            Method: GET
            Auth:
              ApiKeyRequired: false
        AdminGetUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users/{user_id}
            Method: GET
            Auth:
              ApiKeyRequired: false
        AdminPatchUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users/{user_id}
            Method: PATCH
            Auth:
              ApiKeyRequired: false
        AdminDeleteUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users/{user_id}
            Method: DELETE
            Auth:
              ApiKeyRequired: false
        # ── CORS preflight OPTIONS ─────────────────────────────────────────
        # Browsers never include x-api-key in preflight requests, so every path
        # needs an explicit OPTIONS event with ApiKeyRequired: false.
        # A {proxy+} catch-all cannot be used here because API Gateway prohibits
        # sibling variable path parameters ({proxy+} vs {location_path}).
        # The Lambda's CORSConfig returns 200 + CORS headers for all OPTIONS.
        OptionsGetLeads:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/{location_path}/leads
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsListLocations:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/locations
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsGetLocation:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/locations/{location_code}
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsUsers:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users/{user_id}
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsStripeWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/stripe/webhook
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsAuthRequestLogin:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/request-login
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsAuthVerify:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/verify
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsAuthMe:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/me
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsAuthLeads:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/leads
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsAdminUsers:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false
        OptionsAdminUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users/{user_id}
            Method: OPTIONS
            Auth:
              ApiKeyRequired: false

  # ── Lambda — POST /{location_path}/update ─────────────────────────────────

  TriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-trigger
      CodeUri: src/trigger/
      Handler: app.handler
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          ECS_CLUSTER_ARN: !GetAtt ScraperCluster.Arn
          TASK_DEFINITION_ARN: !Ref ScraperTaskDefinition
          TASK_SUBNETS: !Join [",", !Ref SubnetIds]
          TASK_SECURITY_GROUP: !Ref ScraperSecurityGroup
          LOCATIONS_TABLE_NAME: !Ref LocationsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action: ecs:RunTask
              Resource: !Ref ScraperTaskDefinition
            - Effect: Allow
              Action: iam:PassRole
              Resource:
                - !GetAtt ScraperTaskExecutionRole.Arn
                - !GetAtt ScraperTaskRole.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !GetAtt LocationsTable.Arn
                - !Sub "${LocationsTable.Arn}/index/*"
      Events:
        PostUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/{location_path}/update
            Method: POST

  # ── Lambda — POST /leads/{lead_id}/parse-document ─────────────────────────
  # Separate function with a longer timeout (Bedrock can take 10-30 s per PDF).
  # Needs: s3:GetObject on DocumentsBucket, bedrock:InvokeModel,
  #        dynamodb:GetItem + dynamodb:UpdateItem on LeadsTable.

  ParseDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-parse-document
      CodeUri: src/parse_document/
      Handler: app.handler
      MemorySize: 512
      Timeout: 120
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          BEDROCK_MODEL_ID: !Ref BedrockModelId
      Policies:
        # Leads — read + update parsed fields
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt LeadsTable.Arn
        # S3 — read PDFs from the documents bucket
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${DocumentsBucket.Arn}/documents/*"
        # Bedrock — invoke the extraction model.
        # Cross-region inference profile ARNs contain a version suffix (:0) that
        # creates a 7th ARN segment, which wildcards cannot span across.
        # Resource: "*" is the standard approach for Bedrock; the action
        # bedrock:InvokeModel already scopes this tightly enough.
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        ParseDocument:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/leads/{lead_id}/parse-document
            Method: POST

  # ── EventBridge — daily scheduled scrape ─────────────────────────────────

  EventBridgeEcsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-eventbridge-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunEcsTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref ScraperTaskDefinition
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt ScraperTaskExecutionRole.Arn
                  - !GetAtt ScraperTaskRole.Arn

  ScheduledScrapeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: probate-scraper-daily
      Description: Daily trigger for the Collin County probate scraper
      ScheduleExpression: !Ref ScrapeSchedule
      State: ENABLED
      Targets:
        - Id: ScraperFargateTask
          Arn: !GetAtt ScraperCluster.Arn
          RoleArn: !GetAtt EventBridgeEcsRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref ScraperTaskDefinition
            TaskCount: 1
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets: !Ref SubnetIds
                SecurityGroups:
                  - !Ref ScraperSecurityGroup
                AssignPublicIp: ENABLED


  # ── S3 + CloudFront — React SPA ──────────────────────────────────────────
  # Hosts the compiled Vite build (ui/dist/).  CloudFront uses an Origin Access
  # Control (OAC) so the bucket stays fully private.

  UiBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasUiBucketName
        - !Ref UiBucketName
        - !Ref AWS::NoValue
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  UiOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-ui-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  UiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UiBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${UiBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub
                  - "arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistId}"
                  - DistId: !Ref UiDistribution

  UiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2
        Origins:
          - Id: UiS3Origin
            DomainName: !GetAtt UiBucket.RegionalDomainName
            OriginAccessControlId: !Ref UiOriginAccessControl
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: UiS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized managed policy
          AllowedMethods: [GET, HEAD, OPTIONS]
          Compress: true
        # SPA routing — send all 403/404s back to index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiEndpoint:
    Description: API Gateway base URL
    Value: !Sub "https://${ProbateApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  ApiKeyId:
    Description: >
      API key ID — retrieve the value with:
      aws apigateway get-api-key --api-key <this-value> --include-value --query value --output text
    Value: !Sub "${ProbateApi}ApiKey"

  EcsClusterName:
    Description: ECS cluster name
    Value: !Ref ScraperCluster

  TaskDefinitionArn:
    Description: Scraper task definition ARN
    Value: !Ref ScraperTaskDefinition

  LeadsTableName:
    Description: Leads DynamoDB table name
    Value: !Ref LeadsTable

  LeadsTableArn:
    Description: Leads DynamoDB table ARN
    Value: !GetAtt LeadsTable.Arn

  LocationsTableName:
    Description: Locations DynamoDB table name
    Value: !Ref LocationsTable

  UsersTableName:
    Description: Users DynamoDB table name
    Value: !Ref UsersTable

  DocumentsBucketName:
    Description: S3 bucket storing scraped documents (documents/{location_code}/{doc_number}.pdf)
    Value: !Ref DocumentsBucket

  DocumentsBucketArn:
    Description: S3 documents bucket ARN
    Value: !GetAtt DocumentsBucket.Arn

  UiBucketName:
    Description: S3 bucket hosting the React SPA (use with make deploy-ui)
    Value: !Ref UiBucket

  UiDistributionId:
    Description: CloudFront distribution ID (use with make deploy-ui to invalidate cache)
    Value: !Ref UiDistribution

  UiUrl:
    Description: Public HTTPS URL for the React SPA
    Value: !Sub "https://${UiDistribution.DomainName}"

