AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Probate leads — ECS Fargate scraper + API Gateway REST API backed by DynamoDB.
  Supports multiple counties via the locations table.

# ---------------------------------------------------------------------------
# Parameters
# ---------------------------------------------------------------------------
Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC in which the Fargate task will run (default VPC is fine)

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: >
      Public subnets for the Fargate task (assignPublicIp=ENABLED is used so
      the task can reach the internet without a NAT Gateway)

  ScraperImageUri:
    Type: String
    Description: >
      Full ECR image URI for the scraper container,
      e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/probate-scraper/scraper:latest

  ScrapeSchedule:
    Type: String
    Default: "cron(0 6 * * ? *)"
    Description: EventBridge schedule expression for the daily scrape (UTC)

  StripeSecretKey:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe secret key (sk_live_... or sk_test_...)

  StripeWebhookSecret:
    Type: String
    Default: ""
    NoEcho: true
    Description: Stripe webhook signing secret (whsec_...)

  ScraperUsername:
    Type: String
    Default: ""
    Description: >
      Login email / username for the county search portal.
      Leave blank to skip authentication (public access only).

  ScraperPassword:
    Type: String
    Default: ""
    NoEcho: true
    Description: Login password for the county search portal.

  DocumentsBucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket name for storing scraped documents. Leave blank to let
      CloudFormation generate a unique name.

  BedrockModelId:
    Type: String
    Default: "us.amazon.nova-pro-v1:0"
    Description: >
      Amazon Bedrock model ID used by ParseDocumentFunction.
      Amazon Nova Pro (us.amazon.nova-pro-v1:0) and Nova Lite support document
      blocks natively via cross-region inference profiles.  Anthropic Claude
      models (Haiku, Sonnet, etc.) silently ignore the document bytes even when
      the Converse API call succeeds — do not use Claude models here.
      Run "make check-bedrock" to verify access before deploying.

  JwtSecret:
    Type: String
    Default: "dev-secret-change-in-prod"
    NoEcho: true
    Description: >
      HMAC-SHA256 secret used to sign magic-link and access tokens.
      Must be a long random string in production.

  MagicLinkBaseUrl:
    Type: String
    Default: "http://localhost:3001/auth/verify"
    Description: >
      Base URL for magic-link emails, e.g. https://app.example.com/auth/verify.
      The token is appended as ?token=<value>.

  FromEmail:
    Type: String
    Default: ""
    Description: >
      SES-verified sender address for magic-link emails.
      Leave blank to skip sending (local dev / CI).


  UiBucketName:
    Type: String
    Default: ""
    Description: >
      S3 bucket name for the React SPA static assets.
      Leave blank to let CloudFormation generate a unique name.

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: >
      ACM certificate ARN (must be in us-east-1) covering collincountyleads.com,
      www.collincountyleads.com, and api.collincountyleads.com.
      Leave blank to use the default CloudFront certificate (*.cloudfront.net).

  UiDomainAliases:
    Type: String
    Default: ""
    Description: >
      Comma-separated custom domain names for the CloudFront distribution,
      e.g. collincountyleads.com,www.collincountyleads.com.
      Leave blank to use the default CloudFront domain.

  ApiDomainName:
    Type: String
    Default: ""
    Description: >
      Custom domain for API Gateway, e.g. api.collincountyleads.com.
      Leave blank to skip custom domain creation.

  UiBaseUrl:
    Type: String
    Default: "https://collincountyleads.com"
    Description: >
      Base URL of the React UI, used to build prospect subscribe/unsubscribe links
      in marketing emails, e.g. https://collincountyleads.com.

  AdminEmail:
    Type: String
    Default: "admin@collincountyleads.com"
    Description: >
      Destination email address for admin notifications (feedback submissions, etc.).

# ---------------------------------------------------------------------------
# Conditions
# ---------------------------------------------------------------------------
Conditions:
  HasDocumentsBucketName: !Not [!Equals [!Ref DocumentsBucketName, ""]]
  HasUiBucketName: !Not [!Equals [!Ref UiBucketName, ""]]
  HasUiDomains: !Not [!Equals [!Ref UiDomainAliases, ""]]
  HasApiDomain: !Not [!Equals [!Ref ApiDomainName, ""]]

# ---------------------------------------------------------------------------
# Globals
# ---------------------------------------------------------------------------
Globals:
  Function:
    Runtime: python3.12
    Architectures: [x86_64]
    Environment:
      Variables:
        DOCUMENTS_TABLE_NAME: !Ref DocumentsTable
        CONTACTS_TABLE_NAME: !Ref ContactsTable
        PROPERTIES_TABLE_NAME: !Ref PropertiesTable
        LINKS_TABLE_NAME: !Ref LinksTable
        LOCATIONS_TABLE_NAME: !Ref LocationsTable
        USERS_TABLE_NAME: !Ref UsersTable
        EVENTS_TABLE_NAME: events
        GSI_NAME: recorded-date-index
        LOCATION_DATE_GSI: location-date-index
        USER_EVENT_GSI: user-event-index
        SES_CONFIGURATION_SET: !Ref SesConfigurationSet
        STRIPE_SECRET_KEY: !Ref StripeSecretKey
        STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
        JWT_SECRET: !Ref JwtSecret
        MAGIC_LINK_BASE_URL: !Ref MagicLinkBaseUrl
        UI_BASE_URL: !Ref UiBaseUrl
        FROM_EMAIL: !Ref FromEmail
        ADMIN_EMAIL: !Ref AdminEmail

# ---------------------------------------------------------------------------
# Resources
# ---------------------------------------------------------------------------
Resources:

  # ── S3 — Documents ────────────────────────────────────────────────────────
  # Stores a copy of each scraped PDF / image, keyed as:
  #   documents/{location_code}/{doc_number}{ext}
  # The DOCUMENTS_BUCKET env var is injected into the ECS task definition so
  # the scraper can upload directly from the Fargate container.

  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasDocumentsBucketName
        - !Ref DocumentsBucketName
        - !Ref AWS::NoValue
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── DynamoDB — Documents ──────────────────────────────────────────────────
  # Stores one row per scraped probate document (PK: document_id, a UUID5).
  # DeletionPolicy: Retain protects production data if the stack is deleted or
  # the resource is replaced.

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: documents
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: doc_type
          AttributeType: S
        - AttributeName: recorded_date
          AttributeType: S
        - AttributeName: location_code
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Legacy GSI — kept for backward compatibility
        - IndexName: recorded-date-index
          KeySchema:
            - AttributeName: doc_type
              KeyType: HASH
            - AttributeName: recorded_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # Query documents by location efficiently
        - IndexName: location-date-index
          KeySchema:
            - AttributeName: location_code
              KeyType: HASH
            - AttributeName: recorded_date
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Contacts ───────────────────────────────────────────────────
  # Stores one row per person parsed from a document (deceased, executor, heirs, etc.).

  ContactsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: contacts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: contact_id
          AttributeType: S
        - AttributeName: document_id
          AttributeType: S
      KeySchema:
        - AttributeName: contact_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: document-contact-index
          KeySchema:
            - AttributeName: document_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Properties ─────────────────────────────────────────────────
  # Stores one row per real-estate asset parsed from a document.

  PropertiesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: properties
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: property_id
          AttributeType: S
        - AttributeName: document_id
          AttributeType: S
      KeySchema:
        - AttributeName: property_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: document-property-index
          KeySchema:
            - AttributeName: document_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Links ──────────────────────────────────────────────────────
  # Stores user-added reference links attached to contacts or properties.

  LinksTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: links
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: link_id
          AttributeType: S
        - AttributeName: document_id
          AttributeType: S
      KeySchema:
        - AttributeName: link_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: document-link-index
          KeySchema:
            - AttributeName: document_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Locations ──────────────────────────────────────────────────

  LocationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: locations
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: location_code
          AttributeType: S
        - AttributeName: location_path
          AttributeType: S
      KeySchema:
        - AttributeName: location_code
          KeyType: HASH
      GlobalSecondaryIndexes:
        # Allows API to resolve location_path → location_code
        - IndexName: location-path-index
          KeySchema:
            - AttributeName: location_path
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── DynamoDB — Users ──────────────────────────────────────────────────────
  # NOTE: renamed from subscribers → users (PK subscriber_id → user_id).
  # CloudFormation will replace (delete + recreate) the table on first deploy
  # of this branch — export any production data before deploying.

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: email
          AttributeType: S
      KeySchema:
        - AttributeName: user_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: email-index
          KeySchema:
            - AttributeName: email
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  EventsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: events
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: event_id
          AttributeType: S
        - AttributeName: user_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: event_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: user-event-index
          KeySchema:
            - AttributeName: user_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ── SES — Configuration Set + Event Publishing ─────────────────────────────
  # Publishes send/delivery/open/bounce/complaint events to SNS.
  # SES automatically adds a tracking pixel to HTML emails for open tracking.
  # Click tracking is intentionally disabled to preserve prospect token links.

  SesConfigurationSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: !Sub "${AWS::StackName}-events"

  SesEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-ses-events"

  SesEventsTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SesEventsTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SesEventsTopic

  SesConfigurationSetEventDestination:
    Type: AWS::SES::ConfigurationSetEventDestination
    Properties:
      ConfigurationSetName: !Ref SesConfigurationSet
      EventDestination:
        Name: ses-events-sns
        Enabled: true
        MatchingEventTypes:
          - send
          - delivery
          - open
          - bounce
          - complaint
        SnsDestination:
          TopicARN: !Ref SesEventsTopic

  # ── Lambda — SES event processor ──────────────────────────────────────────

  SesEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-ses-events
      CodeUri: src/ses_events/
      Handler: app.handler
      MemorySize: 128
      Timeout: 30
      Environment:
        Variables:
          EVENTS_TABLE_NAME: events
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/events"
      Events:
        SnsEvent:
          Type: SNS
          Properties:
            Topic: !Ref SesEventsTopic

  # ── CloudWatch Log Group ──────────────────────────────────────────────────

  ScraperLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/probate-scraper
      RetentionInDays: 30

  # ── ECS ───────────────────────────────────────────────────────────────────

  ScraperCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: probate-scraper-cluster

  ScraperTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ScraperTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:BatchWriteItem
                  - dynamodb:BatchGetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt DocumentsTable.Arn
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub "${DocumentsTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt LocationsTable.Arn
        - PolicyName: S3DocumentsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub "${DocumentsBucket.Arn}/documents/*"

  ScraperSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Fargate scraper - outbound only
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  ScraperTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: probate-scraper
      Cpu: "1024"
      Memory: "2048"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt ScraperTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ScraperTaskRole.Arn
      ContainerDefinitions:
        - Name: scraper
          Image: !Ref ScraperImageUri
          Essential: true
          Environment:
            - Name: DOCUMENTS_TABLE_NAME
              Value: !Ref DocumentsTable
            - Name: LOCATIONS_TABLE_NAME
              Value: !Ref LocationsTable
            - Name: AWS_DEFAULT_REGION
              Value: !Ref AWS::Region
            - Name: LOCATION_CODE
              Value: CollinTx
            - Name: DOCUMENTS_BUCKET
              Value: !Ref DocumentsBucket
            - Name: SCRAPER_USERNAME
              Value: !Ref ScraperUsername
            - Name: SCRAPER_PASSWORD
              Value: !Ref ScraperPassword
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ScraperLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: scraper

  # ── API Gateway ───────────────────────────────────────────────────────────

  ProbateApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: probate-leads-api
      StageName: prod
      Auth:
        # Default is false so SAM's Cors mock OPTIONS methods (which inherit
        # the API-level default) work without an API key.  Protected routes
        # set ApiKeyRequired: true explicitly in their event definitions.
        ApiKeyRequired: false
        UsagePlan:
          CreateUsagePlan: PER_API
          Throttle:
            RateLimit: 10
            BurstLimit: 20
      # SAM's Cors block generates API Gateway mock OPTIONS integrations that
      # respond directly (no Lambda invocation, no Lambda permission needed).
      # Mock OPTIONS methods always have ApiKeyRequired: false per AWS behaviour,
      # so browsers can complete preflight without an x-api-key header.
      # This keeps the Lambda resource policy small (32 permissions vs 52).
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'GET,POST,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization,x-api-key'"
        MaxAge: "'3000'"

  # ── API Gateway custom domain (api.collincountyleads.com) ─────────────────
  # Edge-optimized: API Gateway manages a CloudFront distribution internally.
  # In Cloudflare, CNAME api.collincountyleads.com → ApiCustomDomainTarget
  # output value, with Proxy set to DNS-only (gray cloud).

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: HasApiDomain
    Properties:
      DomainName: !Ref ApiDomainName
      CertificateArn: !Ref AcmCertificateArn
      EndpointConfiguration:
        Types: [EDGE]
      SecurityPolicy: TLS_1_2

  ApiBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasApiDomain
    Properties:
      DomainName: !Ref ApiCustomDomain
      RestApiId: !Ref ProbateApi
      Stage: prod

  # ── Lambda — API (leads + locations + users + stripe + auth + admin) ───────

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-api
      CodeUri: src/api/
      Handler: app.handler
      MemorySize: 256
      Timeout: 10
      Policies:
        # Documents — read only
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt DocumentsTable.Arn
                - !Sub "${DocumentsTable.Arn}/index/*"
        # Contacts — read only
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt ContactsTable.Arn
                - !Sub "${ContactsTable.Arn}/index/*"
        # Properties — read only
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt PropertiesTable.Arn
                - !Sub "${PropertiesTable.Arn}/index/*"
        # Locations — read only
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt LocationsTable.Arn
                - !Sub "${LocationsTable.Arn}/index/*"
        # Users — full CRUD
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:UpdateItem
                - dynamodb:DeleteItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt UsersTable.Arn
                - !Sub "${UsersTable.Arn}/index/*"
        # Events — write + query + scan (admin dashboard)
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Query
                - dynamodb:Scan
              Resource:
                - !GetAtt EventsTable.Arn
                - !Sub "${EventsTable.Arn}/index/*"
        # Links — full CRUD
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:PutItem
                - dynamodb:DeleteItem
                - dynamodb:Query
              Resource:
                - !GetAtt LinksTable.Arn
                - !Sub "${LinksTable.Arn}/index/*"
        # SES — send magic-link emails (only when FROM_EMAIL is set)
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
              Resource: "*"
      Events:
        # Documents — by location_path
        GetDocuments:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/{location_path}/documents
            Method: GET
            Auth:
              ApiKeyRequired: true
        # Single document (with contacts + properties)
        GetDocument:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}
            Method: GET
            Auth:
              ApiKeyRequired: true
        # Contacts for a document
        GetDocumentContacts:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/contacts
            Method: GET
            Auth:
              ApiKeyRequired: true
        # Update / delete a single contact
        UpdateContact:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/contacts/{contact_id}
            Method: PATCH
            Auth:
              ApiKeyRequired: true
        DeleteContact:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/contacts/{contact_id}
            Method: DELETE
            Auth:
              ApiKeyRequired: true
        # Properties for a document
        GetDocumentProperties:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/properties
            Method: GET
            Auth:
              ApiKeyRequired: true
        # Update / delete a single property
        UpdateProperty:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/properties/{property_id}
            Method: PATCH
            Auth:
              ApiKeyRequired: true
        DeleteProperty:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/properties/{property_id}
            Method: DELETE
            Auth:
              ApiKeyRequired: true
        # Links — contacts
        CreateContactLink:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/contacts/{contact_id}/links
            Method: POST
            Auth:
              ApiKeyRequired: true
        DeleteContactLink:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/contacts/{contact_id}/links/{link_id}
            Method: DELETE
            Auth:
              ApiKeyRequired: true
        # Links — properties
        CreatePropertyLink:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/properties/{property_id}/links
            Method: POST
            Auth:
              ApiKeyRequired: true
        DeletePropertyLink:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/properties/{property_id}/links/{link_id}
            Method: DELETE
            Auth:
              ApiKeyRequired: true
        # Locations
        ListLocations:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/locations
            Method: GET
            Auth:
              ApiKeyRequired: true
        GetLocation:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/locations/{location_code}
            Method: GET
            Auth:
              ApiKeyRequired: true
        # Users
        ListUsers:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users
            Method: GET
            Auth:
              ApiKeyRequired: true
        CreateUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users
            Method: POST
            Auth:
              ApiKeyRequired: true
        GetUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users/{user_id}
            Method: GET
            Auth:
              ApiKeyRequired: true
        UpdateUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users/{user_id}
            Method: PATCH
            Auth:
              ApiKeyRequired: true
        DeleteUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/users/{user_id}
            Method: DELETE
            Auth:
              ApiKeyRequired: true
        # Stripe webhook — no API key required (verified by signature)
        StripeWebhook:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/stripe/webhook
            Method: POST
        # Auth — magic-link login (no API key required; Bearer JWT used instead)
        AuthRequestLogin:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/request-login
            Method: POST
        AuthVerify:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/verify
            Method: GET
        AuthMe:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/me
            Method: GET
        AuthPatchMe:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/me
            Method: PATCH
        AuthLeads:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/leads
            Method: GET
        # Admin — user management (no API key; admin Bearer JWT required)
        AdminListUsers:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users
            Method: GET
        AdminGetUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users/{user_id}
            Method: GET
        AdminPatchUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users/{user_id}
            Method: PATCH
        AdminDeleteUser:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/users/{user_id}
            Method: DELETE
        # Prospect — admin send + public unsubscribe/checkout (no API key)
        AdminProspectSend:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/prospect/send
            Method: POST
        AuthUnsubscribe:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/auth/unsubscribe
            Method: POST
        StripeCheckout:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/stripe/checkout
            Method: POST
        # Events — POST (prospect JWT) + GET (admin Bearer token)
        PostEvents:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/events
            Method: POST
        GetEvents:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/events
            Method: GET
        # Admin events list + dashboard (no API key; admin Bearer JWT required)
        AdminListAllEvents:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/events
            Method: GET
        AdminEventsDashboard:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/admin/events/dashboard
            Method: GET
        # Feedback — public, no API key or auth required
        PostFeedback:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/feedback
            Method: POST
        # Customer Journeys — admin endpoints require admin Bearer JWT, public endpoints no auth
        JourneysInviteToWaitlist:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/journeys/invite-to-waitlist
            Method: POST
        JourneysAcceptWaitlist:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/journeys/accept-waitlist
            Method: POST
        JourneysInviteToJoinFromWaitlist:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/journeys/invite-to-join-from-waitlist
            Method: POST
        JourneysInviteToTrial:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/journeys/invite-to-trial
            Method: POST
        JourneysStartTrial:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/journeys/start-trial
            Method: POST
        JourneysTrialStatus:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/journeys/trial-status/{user_id}
            Method: GET

  # ── Lambda — POST /{location_path}/update ─────────────────────────────────

  TriggerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-trigger
      CodeUri: src/trigger/
      Handler: app.handler
      MemorySize: 256
      Timeout: 10
      Environment:
        Variables:
          ECS_CLUSTER_ARN: !GetAtt ScraperCluster.Arn
          TASK_DEFINITION_ARN: !Ref ScraperTaskDefinition
          TASK_SUBNETS: !Join [",", !Ref SubnetIds]
          TASK_SECURITY_GROUP: !Ref ScraperSecurityGroup
          LOCATIONS_TABLE_NAME: !Ref LocationsTable
      Policies:
        - Statement:
            - Effect: Allow
              Action: ecs:RunTask
              Resource: !Ref ScraperTaskDefinition
            - Effect: Allow
              Action: iam:PassRole
              Resource:
                - !GetAtt ScraperTaskExecutionRole.Arn
                - !GetAtt ScraperTaskRole.Arn
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:Query
              Resource:
                - !GetAtt LocationsTable.Arn
                - !Sub "${LocationsTable.Arn}/index/*"
      Events:
        PostUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/{location_path}/update
            Method: POST

  # ── Lambda — POST /documents/{document_id}/parse-document ─────────────────
  # Separate function with a longer timeout (Bedrock can take 10-30 s per PDF).
  # Reads the document from DocumentsTable, fetches the PDF from S3, calls
  # Bedrock, then writes contacts/properties and stamps parsed_at on the doc.

  ParseDocumentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: probate-leads-parse-document
      CodeUri: src/parse_document/
      Handler: app.handler
      MemorySize: 512
      Timeout: 120
      Environment:
        Variables:
          DOCUMENTS_BUCKET: !Ref DocumentsBucket
          BEDROCK_MODEL_ID: !Ref BedrockModelId
          DOCUMENTS_TABLE_NAME: !Ref DocumentsTable
          CONTACTS_TABLE_NAME: !Ref ContactsTable
          PROPERTIES_TABLE_NAME: !Ref PropertiesTable
          LINKS_TABLE_NAME: !Ref LinksTable
      Policies:
        # Documents — read + stamp parsed_at
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource: !GetAtt DocumentsTable.Arn
        # Contacts — write parsed contacts + query/delete for re-parse clearing
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:BatchWriteItem
              Resource: !GetAtt ContactsTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !Sub "${ContactsTable.Arn}/index/document-contact-index"
        # Properties — write parsed properties + query/delete for re-parse clearing
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:BatchWriteItem
              Resource: !GetAtt PropertiesTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !Sub "${PropertiesTable.Arn}/index/document-property-index"
        # Links — auto-insert on parse + query/delete for re-parse clearing
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:BatchWriteItem
              Resource: !GetAtt LinksTable.Arn
            - Effect: Allow
              Action:
                - dynamodb:Query
              Resource: !Sub "${LinksTable.Arn}/index/document-link-index"
        # S3 — read PDFs from the documents bucket
        - Statement:
            - Effect: Allow
              Action:
                - s3:GetObject
              Resource: !Sub "${DocumentsBucket.Arn}/documents/*"
        # Bedrock — invoke the extraction model.
        # Cross-region inference profile ARNs contain a version suffix (:0) that
        # creates a 7th ARN segment, which wildcards cannot span across.
        # Resource: "*" is the standard approach for Bedrock; the action
        # bedrock:InvokeModel already scopes this tightly enough.
        - Statement:
            - Effect: Allow
              Action:
                - bedrock:InvokeModel
              Resource: "*"
      Events:
        ParseDocument:
          Type: Api
          Properties:
            RestApiId: !Ref ProbateApi
            Path: /real-estate/probate-leads/documents/{document_id}/parse-document
            Method: POST

  # ── EventBridge — daily scheduled scrape ─────────────────────────────────

  EventBridgeEcsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: probate-scraper-eventbridge-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RunEcsTask
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ecs:RunTask
                Resource: !Ref ScraperTaskDefinition
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt ScraperTaskExecutionRole.Arn
                  - !GetAtt ScraperTaskRole.Arn

  ScheduledScrapeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: probate-scraper-daily
      Description: Daily trigger for the Collin County probate scraper
      ScheduleExpression: !Ref ScrapeSchedule
      State: ENABLED
      Targets:
        - Id: ScraperFargateTask
          Arn: !GetAtt ScraperCluster.Arn
          RoleArn: !GetAtt EventBridgeEcsRole.Arn
          EcsParameters:
            TaskDefinitionArn: !Ref ScraperTaskDefinition
            TaskCount: 1
            LaunchType: FARGATE
            NetworkConfiguration:
              AwsVpcConfiguration:
                Subnets: !Ref SubnetIds
                SecurityGroups:
                  - !Ref ScraperSecurityGroup
                AssignPublicIp: ENABLED


  # ── S3 + CloudFront — React SPA ──────────────────────────────────────────
  # Hosts the compiled Vite build (ui/dist/).  CloudFront uses an Origin Access
  # Control (OAC) so the bucket stays fully private.

  UiBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !If
        - HasUiBucketName
        - !Ref UiBucketName
        - !Ref AWS::NoValue
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  UiOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${AWS::StackName}-ui-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  UiBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref UiBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${UiBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub
                  - "arn:aws:cloudfront::${AWS::AccountId}:distribution/${DistId}"
                  - DistId: !Ref UiDistribution

  UiDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        PriceClass: PriceClass_100
        HttpVersion: http2
        Aliases: !If
          - HasUiDomains
          - !Split [",", !Ref UiDomainAliases]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasUiDomains
          - AcmCertificateArn: !Ref AcmCertificateArn
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true
        Origins:
          - Id: UiS3Origin
            DomainName: !GetAtt UiBucket.RegionalDomainName
            OriginAccessControlId: !Ref UiOriginAccessControl
            S3OriginConfig: {}
        DefaultCacheBehavior:
          TargetOriginId: UiS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized managed policy
          AllowedMethods: [GET, HEAD, OPTIONS]
          Compress: true
        # SPA routing — send all 403/404s back to index.html
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# ---------------------------------------------------------------------------
# Outputs
# ---------------------------------------------------------------------------
Outputs:
  ApiEndpoint:
    Description: API Gateway base URL
    Value: !Sub "https://${ProbateApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  ApiKeyId:
    Description: >
      API key ID — retrieve the value with:
      aws apigateway get-api-key --api-key <this-value> --include-value --query value --output text
    Value: !Sub "${ProbateApi}ApiKey"

  EcsClusterName:
    Description: ECS cluster name
    Value: !Ref ScraperCluster

  TaskDefinitionArn:
    Description: Scraper task definition ARN
    Value: !Ref ScraperTaskDefinition

  DocumentsTableName:
    Description: Documents DynamoDB table name
    Value: !Ref DocumentsTable

  DocumentsTableArn:
    Description: Documents DynamoDB table ARN
    Value: !GetAtt DocumentsTable.Arn

  ContactsTableName:
    Description: Contacts DynamoDB table name
    Value: !Ref ContactsTable

  PropertiesTableName:
    Description: Properties DynamoDB table name
    Value: !Ref PropertiesTable

  LocationsTableName:
    Description: Locations DynamoDB table name
    Value: !Ref LocationsTable

  UsersTableName:
    Description: Users DynamoDB table name
    Value: !Ref UsersTable

  EventsTableName:
    Description: Events DynamoDB table name
    Value: !Ref EventsTable

  LinksTableName:
    Description: Links DynamoDB table name
    Value: !Ref LinksTable

  DocumentsBucketName:
    Description: S3 bucket storing scraped documents (documents/{location_code}/{doc_number}.pdf)
    Value: !Ref DocumentsBucket

  DocumentsBucketArn:
    Description: S3 documents bucket ARN
    Value: !GetAtt DocumentsBucket.Arn

  UiBucketName:
    Description: S3 bucket hosting the React SPA (use with make deploy-ui)
    Value: !Ref UiBucket

  UiDistributionId:
    Description: CloudFront distribution ID (use with make deploy-ui to invalidate cache)
    Value: !Ref UiDistribution

  UiUrl:
    Description: Public HTTPS URL for the React SPA
    Value: !Sub "https://${UiDistribution.DomainName}"

  ApiCustomDomainTarget:
    Condition: HasApiDomain
    Description: >
      CNAME target for api.collincountyleads.com in Cloudflare (Proxy: DNS only / gray cloud).
    Value: !GetAtt ApiCustomDomain.DistributionDomainName

